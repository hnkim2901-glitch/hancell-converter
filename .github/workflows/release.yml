name: Build and Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.1.0 등의 태그가 푸시되면 실행

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller hancell-converter.spec

    - name: Get version
      id: version
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: 한셀 파일 일괄 변환기 ${{ steps.version.outputs.VERSION }}
        body: |
          ## 변경 사항
          - 자동 빌드된 릴리스입니다.
          - CHANGELOG.md를 참조하세요.

          ## 다운로드
          아래 Assets에서 `HancellConverter.exe`를 다운로드하세요.

          ## 시스템 요구사항
          - Windows 10 이상
          - 한컴오피스 한셀 설치 필요

          ## 사용 방법
          1. exe 파일 다운로드
          2. 더블클릭하여 실행
          3. 한셀 파일을 드래그앤드롭
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/HancellConverter.exe
        asset_name: HancellConverter.exe
        asset_content_type: application/octet-stream
